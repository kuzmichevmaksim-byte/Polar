<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Полар — контроль вахт</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    :root{
      --bg:#f4f6f8;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --blue:#2563eb;
      --red:#b91c1c;
      --red-bg:#fee2e2;
      --yellow:#92400e;
      --yellow-bg:#fef3c7;
      --green:#166534;
      --green-bg:#dcfce7;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      padding:12px;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{max-width:900px;margin:0 auto}
    h1{font-size:26px;margin:4px 0}
    .subtitle{color:var(--muted);font-size:14px;margin-bottom:12px}
    .panel,.worker{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      margin-bottom:12px;
      box-shadow:0 6px 18px rgba(0,0,0,.04);
    }
    input,button{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid var(--border);
      font:inherit;
      background:#fff;
    }
    label{
      display:block;
      margin:10px 0 5px;
      color:var(--muted);
      font-size:14px;
    }
    button{
      cursor:pointer;
      border:0;
      font-weight:800;
      background:var(--blue);
      color:white;
      margin-top:8px;
    }
    button.secondary{
      background:#eef2ff;
      color:var(--blue);
      border:1px solid #dbe4ff;
    }
    button.danger{
      background:var(--red-bg);
      color:var(--red);
      border:1px solid #fecaca;
    }
    button.gray{
      background:#f3f4f6;
      color:#374151;
      border:1px solid var(--border);
    }
    button.excel{
      background:#16a34a;
      color:white;
    }
    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }
    .stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin-bottom:12px;
    }
    .stat{
      background:white;
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      text-align:center;
    }
    .stat b{
      font-size:26px;
      display:block;
    }
    .stat span{
      color:var(--muted);
      font-size:13px;
    }
    .stat.red{background:var(--red-bg);color:var(--red);border-color:#fecaca}
    .stat.yellow{background:var(--yellow-bg);color:var(--yellow);border-color:#fde68a}
    .worker.red{background:var(--red-bg);border-color:#fecaca;color:var(--red)}
    .worker.yellow{background:var(--yellow-bg);border-color:#fde68a;color:var(--yellow)}
    .worker.green{background:var(--green-bg);border-color:#bbf7d0;color:var(--green)}
    .worker.finished{background:#f3f4f6;color:#4b5563}
    .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }
    .fio{
      font-size:19px;
      font-weight:900;
      line-height:1.2;
    }
    .badge{
      white-space:nowrap;
      border-radius:999px;
      padding:6px 10px;
      font-size:13px;
      font-weight:900;
      background:white;
    }
    .info{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin-top:12px;
    }
    .box{
      background:rgba(255,255,255,.72);
      border-radius:12px;
      padding:9px;
    }
    .box small{
      display:block;
      color:#6b7280;
      font-weight:700;
      margin-bottom:2px;
    }
    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:12px;
    }
    .editBox{
      margin-top:12px;
      padding-top:12px;
      border-top:1px solid rgba(0,0,0,.12);
    }
    .hidden{display:none}
    .empty{
      background:white;
      border:1px dashed var(--border);
      border-radius:16px;
      padding:24px;
      text-align:center;
      color:var(--muted);
    }
    @media(max-width:600px){
      body{padding:8px}
      h1{font-size:22px}
      .row,.info,.stats{grid-template-columns:1fr}
      .top{display:block}
      .badge{display:inline-block;margin-top:8px}
      .actions{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Полар — контроль вахт</h1>
  <div class="subtitle" id="todayText"></div>

  <div class="panel">
    <h3 style="margin:0 0 8px">Добавить человека</h3>

    <label>ФИО</label>
    <input id="fio" placeholder="Иванов Иван Иванович">

    <div class="row">
      <div>
        <label>Дата начала</label>
        <input id="start" type="date">
      </div>
      <div>
        <label>Дней вахты</label>
        <input id="days" type="number" min="1" placeholder="30">
      </div>
    </div>

    <button onclick="addWorker()">Добавить</button>
  </div>

  <div class="stats">
    <div class="stat"><b id="totalCount">0</b><span>Всего</span></div>
    <div class="stat red"><b id="redCount">0</b><span>Меньше 10 дней</span></div>
    <div class="stat yellow"><b id="yellowCount">0</b><span>10–14 дней</span></div>
  </div>

  <div class="panel">
    <input id="search" placeholder="Поиск по ФИО" oninput="render()">
    <button class="excel" onclick="exportToExcel()">Выгрузить в Excel</button>
  </div>

  <div id="list"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA5GDUrl4WeVSqmmv5vkxtaWULfIcQlI5g",
  authDomain: "polar-d815a.firebaseapp.com",
  projectId: "polar-d815a",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let workers = [];
let editingId = null;

function todayMidnight(){
  const d = new Date();
  d.setHours(0,0,0,0);
  return d;
}

function parseLocalDate(value){
  const [y,m,d] = value.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function addDays(date, days){
  const d = new Date(date);
  d.setDate(d.getDate() + Number(days));
  return d;
}

function formatDate(value){
  const d = typeof value === "string" ? parseLocalDate(value) : value;
  return d.toLocaleDateString("ru-RU", {day:"2-digit", month:"2-digit", year:"numeric"});
}

function dateKey(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function calc(w){
  const start = parseLocalDate(w.start);
  const end = addDays(start, Number(w.days));
  const left = Math.ceil((end - todayMidnight()) / (1000*60*60*24));

  let level = "green";
  let label = `${left} дн.`;

  if(left < 0){
    level = "finished";
    label = "вахта закончилась";
  } else if(left === 0){
    level = "red";
    label = "заканчивается сегодня";
  } else if(left < 10){
    level = "red";
  } else if(left < 15){
    level = "yellow";
  }

  return {end, left, level, label};
}

function escapeHtml(str=""){
  return String(str).replace(/[&<>"']/g, s => ({
    "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;"
  }[s]));
}

function addWorker(){
  const fio = document.getElementById("fio").value.trim();
  const start = document.getElementById("start").value;
  const days = Number(document.getElementById("days").value);

  if(!fio) return alert("Введите ФИО");
  if(!start) return alert("Введите дату начала");
  if(!days || days < 1) return alert("Введите количество дней");

  db.collection("workers").add({fio, start, days});

  document.getElementById("fio").value = "";
  document.getElementById("start").value = "";
  document.getElementById("days").value = "";
}

function deleteWorker(id, fio){
  if(confirm(`Удалить "${fio}"?`)){
    db.collection("workers").doc(id).delete();
  }
}

function openEdit(id){
  editingId = id;
  render();
}

function cancelEdit(){
  editingId = null;
  render();
}

function saveEdit(id){
  const fio = document.getElementById("editFio_" + id).value.trim();
  const start = document.getElementById("editStart_" + id).value;
  const days = Number(document.getElementById("editDays_" + id).value);

  if(!fio) return alert("Введите ФИО");
  if(!start) return alert("Введите дату начала");
  if(!days || days < 1) return alert("Введите количество дней");

  db.collection("workers").doc(id).update({fio, start, days});
  editingId = null;
}

function exportToExcel(){
  if(!workers.length){
    return alert("Нет данных для выгрузки");
  }

  const query = (document.getElementById("search").value || "").toLowerCase();

  const rows = workers
    .map(w => ({...w, info: calc(w)}))
    .filter(w => w.fio.toLowerCase().includes(query))
    .sort((a,b) => a.fio.localeCompare(b.fio, "ru"))
    .map((w, index) => ({
      "№": index + 1,
      "ФИО": w.fio,
      "Дата начала": formatDate(w.start),
      "Дней вахты": Number(w.days),
      "Дата окончания": formatDate(w.info.end),
      "Осталось дней": w.info.left < 0 ? 0 : w.info.left,
      "Статус": w.info.label
    }));

  if(!rows.length){
    return alert("По текущему поиску нет данных для выгрузки");
  }

  const worksheet = XLSX.utils.json_to_sheet(rows);
  worksheet["!cols"] = [
    {wch: 6},
    {wch: 32},
    {wch: 14},
    {wch: 12},
    {wch: 16},
    {wch: 14},
    {wch: 24}
  ];

  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Вахты");

  const fileName = "polar_vahty_" + dateKey(todayMidnight()) + ".xlsx";
  XLSX.writeFile(workbook, fileName);
}

db.collection("workers").onSnapshot(snapshot => {
  workers = [];
  snapshot.forEach(doc => workers.push({id: doc.id, ...doc.data()}));
  render();
});

function render(){
  document.getElementById("todayText").textContent =
    "Сегодня: " + todayMidnight().toLocaleDateString("ru-RU", {day:"2-digit", month:"long", year:"numeric"});

  const query = (document.getElementById("search").value || "").toLowerCase();

  const enriched = workers
    .map(w => ({...w, info: calc(w)}))
    .filter(w => w.fio.toLowerCase().includes(query))
    .sort((a,b) => a.fio.localeCompare(b.fio, "ru"));

  const all = workers.map(w => ({...w, info: calc(w)}));

  document.getElementById("totalCount").textContent = workers.length;
  document.getElementById("redCount").textContent =
    all.filter(w => w.info.left >= 0 && w.info.left < 10).length;
  document.getElementById("yellowCount").textContent =
    all.filter(w => w.info.left >= 10 && w.info.left < 15).length;

  const list = document.getElementById("list");

  if(!enriched.length){
    list.innerHTML = `<div class="empty">Список пуст</div>`;
    return;
  }

  list.innerHTML = enriched.map(w => `
    <div class="worker ${w.info.level}">
      <div class="top">
        <div class="fio">${escapeHtml(w.fio)}</div>
        <div class="badge">${escapeHtml(w.info.label)}</div>
      </div>

      <div class="info">
        <div class="box"><small>Начало</small>${formatDate(w.start)}</div>
        <div class="box"><small>Дней</small>${w.days}</div>
        <div class="box"><small>Конец</small><b>${formatDate(w.info.end)}</b></div>
      </div>

      <div class="actions">
        <button class="secondary" onclick="openEdit('${w.id}')">Редактировать</button>
        <button class="danger" onclick="deleteWorker('${w.id}', '${escapeHtml(w.fio).replaceAll("'", "\\'")}')">Удалить</button>
      </div>

      <div class="editBox ${editingId === w.id ? "" : "hidden"}">
        <label>ФИО</label>
        <input id="editFio_${w.id}" value="${escapeHtml(w.fio)}">

        <div class="row">
          <div>
            <label>Дата начала</label>
            <input id="editStart_${w.id}" type="date" value="${w.start}">
          </div>
          <div>
            <label>Дней вахты</label>
            <input id="editDays_${w.id}" type="number" min="1" value="${w.days}">
          </div>
        </div>

        <div class="actions">
          <button onclick="saveEdit('${w.id}')">Сохранить</button>
          <button class="gray" onclick="cancelEdit()">Отмена</button>
        </div>
      </div>
    </div>
  `).join("");
}

setInterval(render, 60000);
</script>
</body>
</html>
