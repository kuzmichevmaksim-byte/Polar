<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Полар — вахта</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{font-family:sans-serif;background:#f4f6f8;margin:0;padding:10px}
.wrap{max-width:900px;margin:auto}
.card{background:white;padding:12px;margin-bottom:10px;border-radius:12px}
input,button{padding:10px;margin:5px;width:100%}
.stat{padding:12px;border-radius:10px;text-align:center;font-weight:bold}
.red{background:#fee2e2}
.yellow{background:#fef3c7}
.green{background:#dcfce7}
</style>
</head>
<body>

<div class="wrap">
<h2>Полар — контроль</h2>

<div class="card">
<input id="request" type="number" placeholder="Заявка">
</div>

<div id="percentBox" class="card stat"></div>

<div class="card">
<input id="fio" placeholder="ФИО">
<input id="start" type="date">
<input id="days" type="number" placeholder="дни">
<button onclick="add()">Добавить</button>
</div>

<div id="list"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA5GDUrl4WeVSqmmv5vkxtaWULfIcQlI5g",
  authDomain: "polar-d815a.firebaseapp.com",
  projectId: "polar-d815a",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let workers=[];

function add(){
  db.collection("workers").add({
    fio:document.getElementById("fio").value,
    start:document.getElementById("start").value,
    days:Number(document.getElementById("days").value)
  });
}

function calcPercent(){
  const fact=workers.length;
  const request=Number(document.getElementById("request").value)||0;

  if(request===0 || fact===0) return;

  const percent=Math.round((request/fact)*100); // 🔥 наоборот
  const box=document.getElementById("percentBox");

  let cls="green";
  if(percent>200) cls="red";
  else if(percent>120) cls="yellow";

  box.className="card stat "+cls;
  box.innerHTML=`
    Заявка: ${request} / Факт: ${fact}<br>
    Недокомплект: ${percent}%
  `;
}

function calc(w){
  const start=new Date(w.start);
  const end=new Date(start);
  end.setDate(start.getDate()+w.days);
  const today=new Date();
  const left=Math.ceil((end-today)/(1000*60*60*24));
  return {end,left};
}

db.collection("workers").onSnapshot(snap=>{
  workers=[];
  snap.forEach(doc=>workers.push(doc.data()));
  render();
});

function render(){
  calcPercent();

  let list=workers.sort((a,b)=>a.fio.localeCompare(b.fio,'ru'));

  const el=document.getElementById("list");
  el.innerHTML="";

  list.forEach(w=>{
    const c=calc(w);

    let color="green";
    if(c.left<10) color="red";
    else if(c.left<15) color="yellow";

    el.innerHTML+=`
      <div class="card ${color}">
        <b>${w.fio}</b><br>
        конец: ${c.end.toLocaleDateString()}<br>
        осталось: ${c.left} дней
      </div>
    `;
  });
}

document.getElementById("request").addEventListener("input",calcPercent);
</script>

</body>
</html>
